<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chladni / Cymatics — Audio-driven</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #0a0a0f;
      color: #c8c8d0;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    #canvas-host {
      position: fixed;
      inset: 0;
    }
    canvas {
      display: block;
    }
    #overlayMeta {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 0.65rem 1rem 0.85rem;
      font-size: 0.78rem;
      text-align: center;
      color: #d8def5;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0));
      pointer-events: none;
      z-index: 10;
      font-family: "Courier New", "Lucida Console", monospace;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-shadow:
        1px 0 0 rgba(0, 0, 0, 0.9),
        -1px 0 0 rgba(0, 0, 0, 0.9),
        0 1px 0 rgba(0, 0, 0, 0.9),
        0 -1px 0 rgba(0, 0, 0, 0.9);
      image-rendering: pixelated;
    }
    #overlayMeta a {
      color: #9eb4ff;
      text-decoration: none;
      pointer-events: auto;
      text-shadow:
        1px 0 0 rgba(0, 0, 0, 0.95),
        -1px 0 0 rgba(0, 0, 0, 0.95),
        0 1px 0 rgba(0, 0, 0, 0.95),
        0 -1px 0 rgba(0, 0, 0, 0.95);
    }
    #overlayMeta a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main id="canvas-host"></main>
  <div id="overlayMeta"><span id="objktMetaValue">Now Visualising: loading...</span></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.0/addons/p5.sound.min.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
